<div class="main-wrapper">
  <div class="box">
    <h2 class="mb-3">DC Sign In</h2>
    <p class="text-muted mb-4" *ngIf="!authBypassEnabled">Use your Google account to access the admin panel.</p>
    <p class="text-muted mb-4" *ngIf="authBypassEnabled">Auth bypass is enabled for this environment. Redirecting...</p>

    <div #googleButtonHost class="google-button mb-4" *ngIf="!authBypassEnabled"></div>

    <details *ngIf="!authBypassEnabled">
      <summary>Manual token fallback</summary>
      <label for="idToken" class="form-label mt-3">Google ID Token</label>
      <textarea id="idToken" [(ngModel)]="idToken" rows="7" class="form-control"
        placeholder="Paste Google credential token"></textarea>
      <button type="button" class="btn btn-primary mt-3" (click)="login()" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in with token' }}
      </button>
    </details>

    <p class="error mt-3 mb-0" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
