<div class="masthead-top d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

    <p class="mb-0 text-muted" *ngIf="user">{{ user.name || user.email }} ({{ user.email }})</p>

</div>

    <a class="nav-link" routerLink="/manage" routerLinkActive="active">Manage</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" routerLink="/metrics" routerLinkActive="active">Metrics</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" routerLink="/health" routerLinkActive="active">Health</a>
  </li>
</ul>
