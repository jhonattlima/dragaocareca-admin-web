<div class="container border border-dark section-box mb-3">
  <h2 class="mt-3">Backend Health</h2>
  <div class="row mb-3">
    <div class="col-md-4"><strong>Status:</strong><br>{{ healthStatus?.status || 'unavailable' }}</div>
    <div class="col-md-4"><strong>Uptime (s):</strong><br>{{ healthStatus?.uptime || 0 }}</div>
    <div class="col-md-4"><strong>Auth Bypass (frontend):</strong><br>{{ authBypassEnabled ? 'enabled' : 'disabled' }}</div>
  </div>
</div>
